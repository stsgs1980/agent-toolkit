name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file structure
        run: |
          echo "Checking required files..."
          MISSING=0
          # Core files
          for f in AGENT_RULES.md PROJECT_CONFIG.md README.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "OK: $f"
            fi
          done
          # Skills
          for f in skills/git-safe-ops/SKILL.md skills/dev-watchdog/SKILL.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "OK: $f"
            fi
          done
          # Instructions
          for f in instructions/onboarding-protocol.md instructions/git-workflow-rules.md instructions/language-rule.md instructions/diagnostic-disclosure.md instructions/writing-plans.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "OK: $f"
            fi
          done
          # Standards (Group B)
          for f in standards/README_TEMPLATE.md standards/No-Unicode_Policy_v2.1.md standards/MARKDOWN_STANDARD_RU_v2.1.md standards/MARKDOWN_STANDARD_EN_v2.1.md standards/REPRODUCIBILITY-STANDARD.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "OK: $f"
            fi
          done
          # Templates (Group A)
          for f in templates/WORKLOG.md templates/TASK_TEMPLATE.md templates/README_WORKLOG.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "OK: $f"
            fi
          done
          exit $MISSING

      - name: Unicode check (no emoji in .md)
        run: |
          echo "Checking for emoji in markdown files..."
          FAIL=0
          for f in $(find . -name '*.md' -not -path './.git/*'); do
            if rg -l '[\x{1F000}-\x{1FFFF}]' "$f" 2>/dev/null; then
              echo "FOUND emoji in: $f"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 0 ]; then
            echo "No emoji found -- OK"
          fi
          exit $FAIL

      - name: Check Stack Signature in key files
        run: |
          echo "Checking Stack Signature in AGENT_RULES.md and README.md..."
          FAIL=0
          for f in AGENT_RULES.md README.md; do
            if ! grep -q 'Built with:' "$f"; then
              echo "NO Stack Signature in: $f"
              FAIL=1
            else
              echo "OK: $f"
            fi
          done
          exit $FAIL

      - name: Check YAML syntax (workflows)
        run: |
          if command -v python3 &>/dev/null; then
            python3 -c "import yaml; [yaml.safe_load(open(f)) for f in __import__('glob').glob('.github/workflows/*.yml')]"
            echo "YAML syntax OK"
          fi
